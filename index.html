<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, user-scalable=no">
<title>from.the.hide</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="from.the.hide">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0e0e0e">

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">

<style>
  :root {
    color-scheme: dark;
  }

  * {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
  }

  html, body {
    height: 100%;
    margin: 0;
    padding: 0;
    background: #0e0e0e;
    overscroll-behavior: none;
  }

  body {
    font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    color: #999;
    -webkit-font-smoothing: antialiased;
    user-select: none;
  }

  #app {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    background: #0e0e0e;
  }

  /* ---------- Header ---------- */
  .app-header {
    flex: 0 0 auto;
    padding-top: calc(env(safe-area-inset-top, 0px) + 14px);
    padding-bottom: 10px;
    text-align: center;
  }

  .app-header span {
    font-size: 8px;
    letter-spacing: 4px;
    color: #2a2a2a;
    text-transform: lowercase;
  }

  /* ---------- Views ---------- */
  .views {
    flex: 1 1 auto;
    position: relative;
    overflow: hidden;
  }

  .view {
    position: absolute;
    inset: 0;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.22s ease;
  }

  .view.active {
    opacity: 1;
    pointer-events: auto;
  }

  /* ---------- Bottom nav ---------- */
  .bottom-nav {
    flex: 0 0 auto;
    display: flex;
    background: #131313;
    border-top: 1px solid #1e1e1e;
    padding-bottom: env(safe-area-inset-bottom, 0px);
  }

  .nav-btn {
    flex: 1;
    background: none;
    border: none;
    padding: 16px 0 14px;
    font-family: inherit;
    font-size: 11px;
    letter-spacing: 3px;
    color: #444;
    transition: color 0.2s ease;
  }

  .nav-btn.active {
    color: #ccc;
  }

  /* ================= LOOK TAB ================= */
  #view-look {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 28px;
    text-align: center;
    min-height: 100%;
  }

  .look-category {
    font-size: 9px;
    letter-spacing: 4px;
    color: #333;
    text-transform: uppercase;
    margin-bottom: 28px;
  }

  .look-prompt {
    font-size: 24px;
    line-height: 1.65;
    color: #999;
    max-width: 560px;
    font-weight: 300;
  }

  .look-next-wrap {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 24px;
    display: flex;
    justify-content: center;
  }

  .look-next {
    background: none;
    border: none;
    color: #444;
    font-family: inherit;
    font-size: 11px;
    letter-spacing: 3px;
    padding: 14px 22px;
    text-transform: lowercase;
  }

  .look-next:active {
    color: #888;
  }

  .look-lens-suggestion {
    font-size: 10px;
    letter-spacing: 2px;
    color: #333;
    text-transform: uppercase;
    margin-top: 36px;
    min-height: 12px;
  }

  #view-look {
    position: relative;
  }

  /* ================= COLOUR TAB ================= */
  #view-colour {
    display: flex;
    flex-direction: column;
  }

  .colour-subnav {
    flex: 0 0 auto;
    display: flex;
    gap: 24px;
    padding: 16px 20px 14px;
    border-bottom: 1px solid #1a1a1a;
  }

  .subnav-btn {
    background: none;
    border: none;
    font-family: inherit;
    font-size: 11px;
    letter-spacing: 2px;
    color: #444;
    padding: 4px 0;
  }

  .subnav-btn.active {
    color: #bbb;
    border-bottom: 1px solid #555;
  }

  .colour-subview {
    display: none;
    flex: 1 1 auto;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  .colour-subview.active {
    display: block;
  }

  /* --- Shades --- */
  .search-wrap {
    padding: 14px 20px 4px;
  }

  #swatch-search {
    width: 100%;
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    color: #999;
    font-family: inherit;
    font-size: 14px;
    padding: 10px 12px;
    border-radius: 3px;
    outline: none;
  }

  #swatch-search::placeholder {
    color: #555;
  }

  .family-group {
    padding: 18px 20px 4px;
  }

  .family-label {
    font-size: 9px;
    letter-spacing: 3px;
    color: #444;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .swatch-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
    gap: 6px;
  }

  .swatch {
    width: 100%;
    height: 72px;
    border-radius: 2px;
    position: relative;
    display: flex;
    align-items: flex-end;
    padding: 5px 6px;
    border: none;
    font-family: inherit;
  }

  .swatch span {
    font-size: 8px;
    line-height: 1.3;
  }

  .swatch-bottom-spacer {
    height: 24px;
  }

  /* full screen swatch view */
  .swatch-full {
    position: fixed;
    inset: 0;
    z-index: 50;
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
  }

  .swatch-full.active {
    display: flex;
  }

  .swatch-full-name {
    font-size: 28px;
    letter-spacing: 1px;
    font-weight: 300;
  }

  .swatch-full-hex {
    font-size: 12px;
    letter-spacing: 2px;
    margin-top: 10px;
    opacity: 0.6;
  }

  /* --- Pairings --- */
  .pairing-card {
    margin-bottom: 30px;
  }

  .pairing-blocks {
    display: flex;
    height: 60px;
    border-radius: 2px;
    overflow: hidden;
  }

  .pairing-block {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .pairing-block span {
    font-size: 10px;
    letter-spacing: 1px;
    text-align: center;
    padding: 0 8px;
  }

  .pairing-desc {
    font-size: 12px;
    line-height: 1.75;
    color: #444;
    margin-top: 12px;
  }

  .pairing-desc div + div {
    margin-top: 6px;
  }

  /* --- Colour of the day --- */
  .cotd-wrap {
    padding: 16px 20px 4px;
  }

  .cotd-label {
    font-size: 9px;
    letter-spacing: 3px;
    color: #333;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .cotd-swatch {
    width: 100%;
    height: 120px;
    border: none;
    border-radius: 2px;
    display: flex;
    align-items: flex-end;
    padding: 12px 14px;
    font-family: inherit;
  }

  .cotd-name {
    font-size: 20px;
    font-weight: 300;
  }

  /* --- Pairing generator --- */
  .pairing-generator {
    padding: 16px 20px calc(20px + env(safe-area-inset-bottom, 0px));
  }

  .new-pairing-btn {
    background: none;
    border: 1px solid #2a2a2a;
    color: #777;
    font-family: inherit;
    font-size: 11px;
    letter-spacing: 3px;
    padding: 12px 0;
    width: 100%;
    border-radius: 3px;
    text-transform: uppercase;
    margin-bottom: 24px;
  }

  .new-pairing-btn:active {
    color: #aaa;
  }

  .save-pairing-btn {
    background: none;
    border: 1px solid #333;
    color: #666;
    font-family: inherit;
    font-size: 10px;
    letter-spacing: 2px;
    padding: 10px 16px;
    border-radius: 3px;
    text-transform: uppercase;
    margin-top: 16px;
  }

  .save-pairing-btn:active {
    color: #999;
  }

  .save-pairing-btn:disabled {
    opacity: 0.4;
  }

  /* --- Shade link inside LOOK prompts --- */
  .shade-link {
    text-decoration: underline;
    text-underline-offset: 3px;
    color: #bbb;
  }

  /* ================= LENS TAB ================= */
  #view-lens {
    padding: 20px 18px calc(24px + env(safe-area-inset-bottom, 0px));
  }

  .lens-card {
    background: #141414;
    border: 1px solid #1e1e1e;
    border-radius: 3px;
    padding: 20px 18px;
    margin-bottom: 14px;
  }

  .lens-name {
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #888;
    margin-bottom: 12px;
  }

  .lens-desc {
    font-size: 14px;
    line-height: 1.8;
    color: #555;
  }

  /* ================= LOG TAB ================= */
  .log-input-row {
    flex: 0 0 auto;
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 16px 20px;
    border-bottom: 1px solid #1a1a1a;
  }

  .log-shade-wrap {
    position: relative;
  }

  #log-shade-input,
  #log-note-input {
    width: 100%;
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    color: #999;
    font-family: inherit;
    font-size: 14px;
    padding: 10px 12px;
    border-radius: 3px;
    outline: none;
  }

  #log-shade-input::placeholder,
  #log-note-input::placeholder {
    color: #555;
  }

  .log-suggestions {
    position: absolute;
    left: 0;
    right: 0;
    top: calc(100% + 2px);
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 3px;
    z-index: 10;
    max-height: 180px;
    overflow-y: auto;
    display: none;
  }

  .log-suggestions.active {
    display: block;
  }

  .log-suggestion-item {
    padding: 9px 12px;
    font-size: 13px;
    color: #999;
  }

  .log-suggestion-item:active {
    background: #2a2a2a;
  }

  .log-add-btn {
    background: none;
    border: 1px solid #333;
    color: #888;
    font-family: inherit;
    font-size: 11px;
    letter-spacing: 2px;
    padding: 11px 0;
    border-radius: 3px;
    text-transform: uppercase;
  }

  .log-add-btn:active {
    color: #ccc;
  }

  .log-list {
    padding: 4px 20px calc(20px + env(safe-area-inset-bottom, 0px));
  }

  .log-entry {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 0;
    border-bottom: 1px solid #1a1a1a;
  }

  .log-dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    flex: 0 0 auto;
  }

  .log-entry-main {
    flex: 1 1 auto;
    min-width: 0;
  }

  .log-entry-shade {
    font-size: 13px;
    color: #bbb;
  }

  .log-entry-note {
    font-size: 12px;
    color: #666;
    margin-top: 2px;
  }

  .log-entry-date {
    font-size: 10px;
    color: #444;
    flex: 0 0 auto;
    margin-left: 4px;
  }

  .log-delete-btn {
    background: none;
    border: none;
    color: #444;
    font-size: 16px;
    line-height: 1;
    padding: 4px 2px 4px 10px;
    flex: 0 0 auto;
  }

  .log-empty {
    font-size: 12px;
    color: #444;
    text-align: center;
    padding: 60px 20px;
  }
</style>
</head>
<body>

<div id="app">

  <header class="app-header"><span>from.the.hide</span></header>

  <div class="views">

    <!-- ============ LOOK ============ -->
    <section id="view-look" class="view active">
      <div class="look-category" id="look-category">SHADE</div>
      <div class="look-prompt" id="look-prompt">Find where Amber has decided to stay after the light has moved on</div>
      <div class="look-lens-suggestion" id="look-lens"></div>
      <div class="look-next-wrap">
        <button class="look-next" id="look-next-btn">random</button>
      </div>
    </section>

    <!-- ============ COLOUR ============ -->
    <section id="view-colour" class="view">
      <div class="cotd-wrap">
        <div class="cotd-label">TODAY'S SHADE</div>
        <button class="cotd-swatch" id="cotd-swatch">
          <span class="cotd-name" id="cotd-name"></span>
        </button>
      </div>

      <nav class="colour-subnav">
        <button class="subnav-btn active" data-subview="shades">SHADES</button>
        <button class="subnav-btn" data-subview="pairings">PAIRINGS</button>
      </nav>

      <div id="subview-shades" class="colour-subview active">
        <div class="search-wrap">
          <input type="text" id="swatch-search" placeholder="search colours" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
        </div>
        <div id="swatch-groups"></div>
        <div class="swatch-bottom-spacer"></div>
      </div>

      <div id="subview-pairings" class="colour-subview">
        <div class="pairing-generator">
          <button class="new-pairing-btn" id="new-pairing-btn">NEW PAIRING</button>
          <div id="pairing-result"></div>
        </div>
      </div>
    </section>

    <!-- ============ LENS ============ -->
    <section id="view-lens" class="view">
      <div id="lens-list"></div>
    </section>

    <!-- ============ LOG ============ -->
    <section id="view-log" class="view">
      <div class="log-input-row">
        <div class="log-shade-wrap">
          <input type="text" id="log-shade-input" placeholder="shade" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
          <div class="log-suggestions" id="log-suggestions"></div>
        </div>
        <input type="text" id="log-note-input" placeholder="where / what" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
        <button class="log-add-btn" id="log-add-btn">ADD</button>
      </div>
      <div class="log-list" id="log-list"></div>
    </section>

  </div>

  <nav class="bottom-nav">
    <button class="nav-btn active" data-view="look">LOOK</button>
    <button class="nav-btn" data-view="colour">COLOUR</button>
    <button class="nav-btn" data-view="lens">LENS</button>
    <button class="nav-btn" data-view="log">LOG</button>
  </nav>

</div>

<div class="swatch-full" id="swatch-full">
  <div class="swatch-full-name" id="swatch-full-name"></div>
  <div class="swatch-full-hex" id="swatch-full-hex"></div>
</div>

<script>
(function () {
  "use strict";

  /* ======================================================
     DATA
     ====================================================== */

  var PROMPTS = {
    SHADE: [
      "Find where Amber has decided to stay after the light has moved on",
      "Look for Rust — not the object, the decision the surface made about time",
      "Haze is doing something to every colour it touches. What?",
      "Find a Midnight that contains blue rather than simply being dark",
      "Where has Ochre survived something?",
      "Ghost is present. Find where",
      "Find Oxblood. It will be quieter than you expect",
      "Where is Smoke accumulating without a fire?",
      "Find Melon. Look for what gave up trying",
      "Find Copper that has been earning its colour for years"
    ],
    RHYTHM: [
      "You are moving faster than everything interesting. Slow down until something catches you",
      "Find where two tempos are arguing over the same surface",
      "Stand between the slowest rhythm and the fastest",
      "Find what is still while everything around it moves",
      "Find the moment something broke from its pattern and hasn't recovered",
      "The city is breathing at a frequency you're not tuned to yet. Listen before you raise the camera",
      "Walk at the pace of the slowest thing you can see"
    ],
    OPTICAL: [
      "Find two colours at the same brightness. Watch what happens to the edge between them",
      "The grey around you is amplifying something. What?",
      "Find a colour that makes the colour next to it more vivid than it would be alone",
      "Find a colour that has lost its saturation but kept its character",
      "Two colours are erasing the distance between them. Find where",
      "Find where temperature changes colour"
    ],
    GESTURE: [
      "You are not hunting. You are waiting",
      "Set the trap before you know what you're trapping",
      "The image exists already. You are finding it",
      "Stop. Wait to be interested rather than deciding to be interested",
      "The decisive moment is not an event. It is a quality of attention arriving",
      "You are the hide, not the hunter. Stay still",
      "Something is moving through a colour field. Don't freeze it"
    ],
    SURFACE: [
      "Find a surface that remembers something you cannot see",
      "Find the oldest surface in your current frame",
      "Find where repetition has left a mark",
      "Find what nearby has absorbed decades of something",
      "Find what has become invisible through being ordinary",
      "What has time worked on longest in what you can see?",
      "Photograph the absence of something that was here recently"
    ],
    SEEING: [
      "Everyone here is looking at the same thing. Don't",
      "What can you see without turning your head?",
      "You are inside the colour field, not looking at it. What does that change?",
      "Find the veil",
      "Stand back until the foreground and background share the same plane. How far is that?",
      "Find a colour decision someone made",
      "The image already exists in the light. Find it",
      "You are looking at a surface. Look through it",
      "Find the surface that separates an interior light from an exterior one. Stand at it"
    ],
    LIGHT: [
      "You are not shooting the subject. You are shooting what the light is doing to the subject",
      "Turn around. The interesting light is probably behind you",
      "Find where two different light sources are arguing over the same surface",
      "The shadow is the subject, not what's casting it",
      "Shoot into the light. Wait",
      "The overcast is doing something specific today. What colour is it making everything?",
      "Listen before you look. What you can hear but not see — find its edge"
    ]
  };

  var CATEGORY_KEYS = Object.keys(PROMPTS);

  var FAMILIES = [
    { name: "Blue", colours: [
      ["Peacock", "#006B8F"], ["Sky", "#87CEEB"], ["Cyan", "#00B4D8"], ["Electric", "#0047AB"],
      ["Cobalt", "#1A4B8C"], ["Swimming Pool", "#4FC3F7"], ["Robin's Egg", "#96C8D8"], ["Denim", "#5B7FA6"],
      ["Baby", "#AED9E0"], ["Ultramarine", "#3F00FF"], ["Navy", "#001F5B"], ["Sapphire", "#0F52BA"],
      ["Pale", "#C8DCF0"], ["Powder", "#B0C4DE"], ["Midnight", "#0D1B2A"]
    ]},
    { name: "Black", colours: [
      ["Ink", "#1C1C2E"], ["Pitch", "#0A0A0A"], ["Licorice", "#1A0B00"], ["Obsidian", "#1B1B1B"],
      ["Asphalt", "#2C2C2C"], ["Ebony", "#0F0F0F"], ["Jet", "#141414"], ["Raven", "#0D0D0D"],
      ["Matte", "#1A1A1A"]
    ]},
    { name: "Pink", colours: [
      ["Blush", "#F5C6C6"], ["Hot", "#FF69B4"], ["Puce", "#CC8899"], ["Bubblegum", "#FF85A2"],
      ["Amaranth", "#E52B50"], ["Coral", "#FF6B6B"], ["Cherry Blossom", "#FFB7C5"], ["Salmon", "#FA8072"],
      ["Flamingo", "#F4A7A3"], ["Rose", "#D4667A"]
    ]},
    { name: "Gray", colours: [
      ["Smoke", "#A9A9A9"], ["Charcoal", "#3D3D3D"], ["Ash", "#B2BEB5"], ["Haze", "#D4D8DD"],
      ["Iron", "#48494B"], ["Slate", "#708090"], ["Silver", "#C0C0C0"], ["Taupe", "#8B8680"]
    ]},
    { name: "White", colours: [
      ["Alabaster", "#F2F0EB"], ["Cream", "#FFFDD0"], ["Linen", "#FAF0E6"], ["Ivory", "#FFFFF0"],
      ["Ghost", "#F8F8FF"], ["Pearl", "#F0EAD6"], ["Lily", "#F7F7F7"], ["Cloud", "#F4F4F4"],
      ["Bone", "#E8DCC8"], ["Snow", "#FFFAFA"]
    ]},
    { name: "Purple", colours: [
      ["Royal", "#7851A9"], ["Lavender", "#B57EDC"], ["Plum", "#8E4585"], ["Orchid", "#DA70D6"],
      ["Mauve", "#C8A2C8"], ["Amethyst", "#9966CC"], ["Lilac", "#C8A2C8"], ["Magenta", "#CC00CC"],
      ["Violet", "#7F00FF"], ["Wine", "#722F37"]
    ]},
    { name: "Red", colours: [
      ["Scarlet", "#FF2400"], ["Raspberry", "#C0224D"], ["Crimson", "#DC143C"], ["Ruby", "#9B111E"],
      ["Vermilion", "#E34234"], ["Oxblood", "#4A0000"], ["Burgundy", "#800020"], ["Maroon", "#800000"],
      ["Auburn", "#A52A2A"]
    ]},
    { name: "Yellow", colours: [
      ["Lemon", "#FFF44F"], ["Goldenrod", "#DAA520"], ["Blonde", "#FAF0BE"], ["Canary", "#FFEF00"],
      ["Gold", "#FFD700"], ["Butter", "#FFFAA0"], ["Citrine", "#E4D00A"], ["Piss", "#C9A227"]
    ]},
    { name: "Orange", colours: [
      ["Peach", "#FFCBA4"], ["Poppy", "#E95239"], ["Carrot", "#ED9121"], ["Tangerine", "#F28500"],
      ["Melon", "#FDB99B"], ["Honey", "#FFC30B"], ["Tiger", "#FC6A03"], ["Amber", "#FFBF00"],
      ["Pumpkin", "#FF7518"], ["Harvest Gold", "#DA9100"], ["Rust", "#B7410E"]
    ]},
    { name: "Brown", colours: [
      ["Beige", "#F5F5DC"], ["Chocolate", "#3D1C02"], ["Sand", "#C2B280"], ["Russet", "#80461B"],
      ["Dirt", "#9B7653"], ["Copper", "#B87333"], ["Ochre", "#CC7722"], ["Golden", "#A67C52"],
      ["Bronze", "#CD7F32"], ["Cinnamon", "#D2691E"]
    ]},
    { name: "Green", colours: [
      ["Jungle", "#1A7A4A"], ["Seafoam", "#9FE2BF"], ["Mint", "#98FF98"], ["Turquoise", "#40E0D0"],
      ["Teal", "#008080"], ["Grass", "#5A8A3C"], ["Avocado", "#568203"], ["Chartreuse", "#7FFF00"],
      ["Emerald", "#50C878"], ["Poison", "#4CAF50"], ["Sage", "#8FAE8B"], ["Jade", "#00A86B"]
    ]}
  ];

  var ALL_SHADES = [];
  FAMILIES.forEach(function (family) {
    family.colours.forEach(function (c) {
      ALL_SHADES.push({ name: c[0], hex: c[1], family: family.name });
    });
  });

  var SHADE_BY_NAME = {};
  ALL_SHADES.forEach(function (s) {
    SHADE_BY_NAME[s.name] = s;
  });

  function escapeRegex(s) {
    return s.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
  }

  var SHADE_NAME_REGEX = new RegExp(
    "\\b(" + ALL_SHADES
      .map(function (s) { return s.name; })
      .sort(function (a, b) { return b.length - a.length; })
      .map(escapeRegex)
      .join("|") + ")\\b",
    "g"
  );

  var LENSES = [
    { name: "Ricoh 28mm", desc: "Immersive. You are inside the rhythm of the street, not observing it. The world comes to you at full density. Everything is present simultaneously. Use when you want to disappear." },
    { name: "Sigma 45mm", desc: "The world as it presents itself. Neither wide nor compressed. No particular agenda. The most honest focal length — it doesn't impose a way of seeing. Use when you don't know what you're looking for." },
    { name: "Zeiss Sonnar 50mm", desc: "Character and warmth at the cost of certainty. Wide open it renders softly, commits to the present moment over precision. Manual focus at this length demands a different pace. Use when you want to be in the image rather than at it." },
    { name: "Sigma 90mm", desc: "The beginning of selection. You are choosing what to compress, what to exclude. The world starts to flatten. Subjects separate from their contexts. Use when you know what you're looking for but not where it is." },
    { name: "Elmarit-R 135mm", desc: "Compression and surfaces. Distance closes. The far becomes adjacent to the near. Colour fields flatten. You are a long way from your subject and that distance is the image. Use when you want to see the city as colour rather than as place." },
    { name: "Elmarit-R 180mm", desc: "Abstraction. The subject is no longer a subject — it is texture, field, fragment. You need space and patience. The world at this length is a different world. Use when you want to stop recognising things." }
  ];

  /* ======================================================
     HELPERS
     ====================================================== */

  function hexToRgb(hex) {
    var h = hex.replace("#", "");
    return {
      r: parseInt(h.substring(0, 2), 16),
      g: parseInt(h.substring(2, 4), 16),
      b: parseInt(h.substring(4, 6), 16)
    };
  }

  function relLuminance(hex) {
    var c = hexToRgb(hex);
    function lin(v) {
      v = v / 255;
      return v <= 0.03928 ? v / 12.92 : Math.pow((v + 0.055) / 1.055, 2.4);
    }
    return 0.2126 * lin(c.r) + 0.7152 * lin(c.g) + 0.0722 * lin(c.b);
  }

  function labelColour(hex) {
    return relLuminance(hex) > 0.45 ? "#111" : "#eee";
  }

  function hexToHsl(hex) {
    var c = hexToRgb(hex);
    var r = c.r / 255, g = c.g / 255, b = c.b / 255;
    var max = Math.max(r, g, b), min = Math.min(r, g, b);
    var h = 0, s = 0, l = (max + min) / 2;
    if (max !== min) {
      var d = max - min;
      s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
      switch (max) {
        case r: h = (g - b) / d + (g < b ? 6 : 0); break;
        case g: h = (b - r) / d + 2; break;
        case b: h = (r - g) / d + 4; break;
      }
      h *= 60;
    }
    return { h: h, s: s, l: l };
  }

  function tempCategory(hex) {
    var h = hexToHsl(hex).h;
    if (h < 60 || h >= 300) return "warm";
    if (h >= 180 && h < 300) return "cool";
    return "neutral";
  }

  function perceivedLuminance(hex) {
    var c = hexToRgb(hex);
    return 0.299 * c.r + 0.587 * c.g + 0.114 * c.b;
  }

  function temperatureStatement(hexA, hexB) {
    var a = tempCategory(hexA), b = tempCategory(hexB);
    if (a === "warm" && b === "warm") return "Two warms, different intensities";
    if (a === "cool" && b === "cool") return "Two cools, different depths";
    if ((a === "warm" && b === "cool") || (a === "cool" && b === "warm")) return "Warm meeting cool";
    if (a === "neutral" && b === "neutral") return "Two neutrals, transitional territory";
    var other = a === "neutral" ? b : a;
    return other === "warm" ? "A neutral meeting warm" : "A neutral meeting cool";
  }

  /*
   * Fixed 15/40 luminance thresholds skewed nearly 70% of random pairs into
   * "strong separation" — this list runs from ~10 (Pitch) to ~253 (Snow) with
   * more very-dark/very-light shades than mid-toned ones. Thresholds are
   * instead derived from the actual pairwise distribution across the current
   * shade list, so the three brightness categories stay roughly equally likely.
   */
  var BRIGHTNESS_THRESHOLDS = (function () {
    var diffs = [];
    for (var i = 0; i < ALL_SHADES.length; i++) {
      for (var j = i + 1; j < ALL_SHADES.length; j++) {
        diffs.push(Math.abs(perceivedLuminance(ALL_SHADES[i].hex) - perceivedLuminance(ALL_SHADES[j].hex)));
      }
    }
    diffs.sort(function (a, b) { return a - b; });
    return {
      low: diffs[Math.floor(diffs.length / 3)],
      high: diffs[Math.floor(diffs.length * 2 / 3)]
    };
  })();

  function brightnessStatement(hexA, hexB) {
    var diff = Math.abs(perceivedLuminance(hexA) - perceivedLuminance(hexB));
    if (diff < BRIGHTNESS_THRESHOLDS.low) return "Very close in brightness — watch for the edge to soften";
    if (diff <= BRIGHTNESS_THRESHOLDS.high) return "Some separation — a little depth between them";
    return "Strong separation — real depth, no ambiguity";
  }

  function hashStringToInt(str) {
    var h = 2166136261;
    for (var i = 0; i < str.length; i++) {
      h ^= str.charCodeAt(i);
      h = Math.imul(h, 16777619);
    }
    return h >>> 0;
  }

  function seededRandom01(seed) {
    var t = (seed += 0x6D2B79F5) >>> 0;
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  }

  function todaysDateKey() {
    var d = new Date();
    var m = String(d.getMonth() + 1);
    var day = String(d.getDate());
    if (m.length < 2) m = "0" + m;
    if (day.length < 2) day = "0" + day;
    return d.getFullYear() + "-" + m + "-" + day;
  }

  function colourOfTheDay() {
    var seed = hashStringToInt(todaysDateKey());
    var idx = Math.floor(seededRandom01(seed) * ALL_SHADES.length);
    return ALL_SHADES[idx];
  }

  /* ======================================================
     LOOK TAB
     ====================================================== */

  var lookCategoryEl = document.getElementById("look-category");
  var lookPromptEl = document.getElementById("look-prompt");
  var lookLensEl = document.getElementById("look-lens");
  var lookNextBtn = document.getElementById("look-next-btn");
  var lookViewEl = document.getElementById("view-look");
  var lastLook = null;

  function renderLookPrompt(cat, prompt) {
    lookPromptEl.innerHTML = "";

    if (cat !== "SHADE") {
      lookPromptEl.textContent = prompt;
      return;
    }

    var lastIndex = 0;
    var match;
    SHADE_NAME_REGEX.lastIndex = 0;
    while ((match = SHADE_NAME_REGEX.exec(prompt)) !== null) {
      if (match.index > lastIndex) {
        lookPromptEl.appendChild(document.createTextNode(prompt.slice(lastIndex, match.index)));
      }
      var span = document.createElement("span");
      span.className = "shade-link";
      span.textContent = match[0];
      span.dataset.shade = match[0];
      lookPromptEl.appendChild(span);
      lastIndex = match.index + match[0].length;
    }
    if (lastIndex < prompt.length) {
      lookPromptEl.appendChild(document.createTextNode(prompt.slice(lastIndex)));
    }
  }

  function nextLook() {
    var cat = CATEGORY_KEYS[Math.floor(Math.random() * CATEGORY_KEYS.length)];
    var list = PROMPTS[cat];
    var prompt = list[Math.floor(Math.random() * list.length)];
    var key = cat + "|" + prompt;
    if (key === lastLook && (list.length > 1 || CATEGORY_KEYS.length > 1)) {
      nextLook();
      return;
    }
    lastLook = key;
    lookCategoryEl.textContent = cat;
    renderLookPrompt(cat, prompt);

    var lens = LENSES[Math.floor(Math.random() * LENSES.length)];
    lookLensEl.textContent = lens.name;
  }

  lookNextBtn.addEventListener("click", function () {
    nextLook();
    ensureWakeLockForLook();
  });

  lookPromptEl.addEventListener("click", function (e) {
    var target = e.target.closest ? e.target.closest(".shade-link") : null;
    if (!target) return;
    var shade = SHADE_BY_NAME[target.dataset.shade];
    if (!shade) return;
    goToShadeInColour(shade.name, shade.hex);
  });

  /* swipe up anywhere on the LOOK screen shuffles too */
  (function () {
    var startX = 0, startY = 0, startT = 0, tracking = false;

    lookViewEl.addEventListener("touchstart", function (e) {
      if (e.touches.length !== 1) return;
      tracking = true;
      startX = e.touches[0].clientX;
      startY = e.touches[0].clientY;
      startT = Date.now();
    }, { passive: true });

    lookViewEl.addEventListener("touchend", function (e) {
      if (!tracking) return;
      tracking = false;
      var touch = e.changedTouches[0];
      if (!touch) return;
      var dx = touch.clientX - startX;
      var dy = touch.clientY - startY;
      var dt = Date.now() - startT;
      if (dy < -50 && Math.abs(dx) < 60 && dt < 800) {
        nextLook();
        ensureWakeLockForLook();
      }
    }, { passive: true });
  })();

  nextLook();

  /* ======================================================
     COLOUR TAB — SHADES
     ====================================================== */

  var swatchGroupsEl = document.getElementById("swatch-groups");
  var swatchSearchEl = document.getElementById("swatch-search");
  var swatchFullEl = document.getElementById("swatch-full");
  var swatchFullNameEl = document.getElementById("swatch-full-name");
  var swatchFullHexEl = document.getElementById("swatch-full-hex");

  function renderSwatches(filter) {
    filter = (filter || "").trim().toLowerCase();
    swatchGroupsEl.innerHTML = "";

    FAMILIES.forEach(function (family) {
      var matches = family.colours.filter(function (c) {
        return !filter || c[0].toLowerCase().indexOf(filter) !== -1;
      });
      if (matches.length === 0) return;

      var groupEl = document.createElement("div");
      groupEl.className = "family-group";

      var labelEl = document.createElement("div");
      labelEl.className = "family-label";
      labelEl.textContent = family.name;
      groupEl.appendChild(labelEl);

      var gridEl = document.createElement("div");
      gridEl.className = "swatch-grid";

      matches.forEach(function (c) {
        var name = c[0], hex = c[1];
        var sw = document.createElement("button");
        sw.className = "swatch";
        sw.style.background = hex;
        var labelColourVal = labelColour(hex);
        sw.innerHTML = '<span style="color:' + labelColourVal + '">' + name + "</span>";
        sw.addEventListener("click", function () {
          openFullSwatch(name, hex);
        });
        gridEl.appendChild(sw);
      });

      groupEl.appendChild(gridEl);
      swatchGroupsEl.appendChild(groupEl);
    });
  }

  function openFullSwatch(name, hex) {
    swatchFullEl.style.background = hex;
    var textColour = labelColour(hex);
    swatchFullNameEl.style.color = textColour;
    swatchFullHexEl.style.color = textColour;
    swatchFullNameEl.textContent = name;
    swatchFullHexEl.textContent = hex.toUpperCase();
    swatchFullEl.classList.add("active");
  }

  swatchFullEl.addEventListener("click", function () {
    swatchFullEl.classList.remove("active");
  });

  swatchSearchEl.addEventListener("input", function () {
    renderSwatches(swatchSearchEl.value);
  });

  renderSwatches("");

  /* ======================================================
     COLOUR TAB — TODAY'S SHADE
     ====================================================== */

  var cotdSwatchEl = document.getElementById("cotd-swatch");
  var cotdNameEl = document.getElementById("cotd-name");
  var cotdDateKey = null;

  function renderColourOfDay() {
    cotdDateKey = todaysDateKey();
    var shade = colourOfTheDay();
    cotdSwatchEl.style.background = shade.hex;
    cotdNameEl.style.color = labelColour(shade.hex);
    cotdNameEl.textContent = shade.name;
    cotdSwatchEl.onclick = function () {
      openFullSwatch(shade.name, shade.hex);
    };
  }

  renderColourOfDay();

  /* catches the date rolling over past local midnight while the app stays open */
  setInterval(function () {
    if (todaysDateKey() !== cotdDateKey) renderColourOfDay();
  }, 60000);

  /* ======================================================
     COLOUR TAB — PAIRINGS (generator)
     ====================================================== */

  var newPairingBtn = document.getElementById("new-pairing-btn");
  var pairingResultEl = document.getElementById("pairing-result");
  var currentGeneratedPairing = null;

  function generatePairing() {
    var i = Math.floor(Math.random() * ALL_SHADES.length);
    var j;
    do {
      j = Math.floor(Math.random() * ALL_SHADES.length);
    } while (j === i);
    currentGeneratedPairing = { a: ALL_SHADES[i], b: ALL_SHADES[j] };
    renderGeneratedPairing();
  }

  function renderGeneratedPairing() {
    pairingResultEl.innerHTML = "";
    if (!currentGeneratedPairing) return;
    var p = currentGeneratedPairing;

    var card = document.createElement("div");
    card.className = "pairing-card";

    var blocks = document.createElement("div");
    blocks.className = "pairing-blocks";
    [p.a, p.b].forEach(function (item) {
      var block = document.createElement("div");
      block.className = "pairing-block";
      block.style.background = item.hex;
      var span = document.createElement("span");
      span.style.color = labelColour(item.hex);
      span.textContent = item.name;
      block.appendChild(span);
      blocks.appendChild(block);
    });

    var analysis = document.createElement("div");
    analysis.className = "pairing-desc";
    var tempLine = document.createElement("div");
    tempLine.textContent = temperatureStatement(p.a.hex, p.b.hex);
    var brightLine = document.createElement("div");
    brightLine.textContent = brightnessStatement(p.a.hex, p.b.hex);
    analysis.appendChild(tempLine);
    analysis.appendChild(brightLine);

    var saveBtn = document.createElement("button");
    saveBtn.className = "save-pairing-btn";
    saveBtn.textContent = "SAVE THIS PAIRING";
    saveBtn.addEventListener("click", function () {
      addLogEntry(p.a.name + " + " + p.b.name, "saved pairing");
      saveBtn.textContent = "SAVED";
      saveBtn.disabled = true;
    });

    card.appendChild(blocks);
    card.appendChild(analysis);
    card.appendChild(saveBtn);
    pairingResultEl.appendChild(card);
  }

  newPairingBtn.addEventListener("click", generatePairing);

  generatePairing();

  /* ======================================================
     COLOUR TAB — sub-nav switching
     ====================================================== */

  var subnavBtns = document.querySelectorAll(".subnav-btn");
  var subviews = {
    shades: document.getElementById("subview-shades"),
    pairings: document.getElementById("subview-pairings")
  };

  function switchColourSubview(key) {
    subnavBtns.forEach(function (b) {
      b.classList.toggle("active", b.dataset.subview === key);
    });
    Object.keys(subviews).forEach(function (k) {
      subviews[k].classList.toggle("active", k === key);
    });
  }

  subnavBtns.forEach(function (btn) {
    btn.addEventListener("click", function () {
      switchColourSubview(btn.dataset.subview);
    });
  });

  /* ======================================================
     LENS TAB
     ====================================================== */

  var lensListEl = document.getElementById("lens-list");

  function renderLenses() {
    lensListEl.innerHTML = "";
    LENSES.forEach(function (lens) {
      var card = document.createElement("div");
      card.className = "lens-card";

      var name = document.createElement("div");
      name.className = "lens-name";
      name.textContent = lens.name;

      var desc = document.createElement("div");
      desc.className = "lens-desc";
      desc.textContent = lens.desc;

      card.appendChild(name);
      card.appendChild(desc);
      lensListEl.appendChild(card);
    });
  }

  renderLenses();

  /* ======================================================
     BOTTOM NAV — tab switching
     ====================================================== */

  var navBtns = document.querySelectorAll(".nav-btn");
  var views = {
    look: document.getElementById("view-look"),
    colour: document.getElementById("view-colour"),
    lens: document.getElementById("view-lens"),
    log: document.getElementById("view-log")
  };
  var currentView = "look";

  function switchView(key) {
    navBtns.forEach(function (b) {
      b.classList.toggle("active", b.dataset.view === key);
    });
    currentView = key;
    Object.keys(views).forEach(function (k) {
      views[k].classList.toggle("active", k === currentView);
    });
    if (currentView === "look") {
      ensureWakeLockForLook();
    } else {
      releaseWakeLock();
    }
  }

  navBtns.forEach(function (btn) {
    btn.addEventListener("click", function () {
      switchView(btn.dataset.view);
    });
  });

  function goToShadeInColour(name, hex) {
    switchView("colour");
    switchColourSubview("shades");
    openFullSwatch(name, hex);
  }

  /* ======================================================
     WAKE LOCK — keep the screen on while reading a prompt
     ====================================================== */

  var wakeLock = null;

  function ensureWakeLockForLook() {
    if (currentView !== "look") return;
    if (!("wakeLock" in navigator)) return;
    if (wakeLock) return;
    navigator.wakeLock.request("screen").then(function (lock) {
      wakeLock = lock;
      wakeLock.addEventListener("release", function () {
        wakeLock = null;
      });
    }).catch(function () {});
  }

  function releaseWakeLock() {
    if (wakeLock) {
      wakeLock.release().catch(function () {});
      wakeLock = null;
    }
  }

  document.addEventListener("visibilitychange", function () {
    if (document.visibilityState === "visible" && currentView === "look") {
      ensureWakeLockForLook();
    }
  });

  ensureWakeLockForLook();

  /* ======================================================
     FIELD LOG
     ====================================================== */

  var LOG_KEY = "fth-fieldlog";
  var MONTH_NAMES = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];

  function loadLogEntries() {
    try {
      var raw = localStorage.getItem(LOG_KEY);
      if (raw === null) return [];
      var parsed = JSON.parse(raw);
      return Array.isArray(parsed) ? parsed : [];
    } catch (e) {
      return [];
    }
  }

  function saveLogEntries(entries) {
    try {
      localStorage.setItem(LOG_KEY, JSON.stringify(entries));
    } catch (e) {}
  }

  var logEntries = loadLogEntries();

  function addLogEntry(shade, note) {
    logEntries.push({ shade: shade, note: note, timestamp: Date.now() });
    saveLogEntries(logEntries);
    renderLog();
  }

  function formatLogDate(ts) {
    var d = new Date(ts);
    return d.getDate() + " " + MONTH_NAMES[d.getMonth()];
  }

  var logListEl = document.getElementById("log-list");

  function renderLog() {
    logListEl.innerHTML = "";

    if (logEntries.length === 0) {
      var empty = document.createElement("div");
      empty.className = "log-empty";
      empty.textContent = "Nothing logged yet.";
      logListEl.appendChild(empty);
      return;
    }

    var sorted = logEntries.slice().sort(function (a, b) {
      return b.timestamp - a.timestamp;
    });

    sorted.forEach(function (entry) {
      var row = document.createElement("div");
      row.className = "log-entry";

      var dot = document.createElement("div");
      dot.className = "log-dot";
      var known = SHADE_BY_NAME[entry.shade];
      dot.style.background = known ? known.hex : "#333";

      var main = document.createElement("div");
      main.className = "log-entry-main";
      var shadeEl = document.createElement("div");
      shadeEl.className = "log-entry-shade";
      shadeEl.textContent = entry.shade;
      main.appendChild(shadeEl);
      if (entry.note) {
        var noteEl = document.createElement("div");
        noteEl.className = "log-entry-note";
        noteEl.textContent = entry.note;
        main.appendChild(noteEl);
      }

      var dateEl = document.createElement("div");
      dateEl.className = "log-entry-date";
      dateEl.textContent = formatLogDate(entry.timestamp);

      var delBtn = document.createElement("button");
      delBtn.className = "log-delete-btn";
      delBtn.textContent = "×";
      delBtn.addEventListener("click", function () {
        var idx = logEntries.indexOf(entry);
        if (idx !== -1) {
          logEntries.splice(idx, 1);
          saveLogEntries(logEntries);
          renderLog();
        }
      });

      row.appendChild(dot);
      row.appendChild(main);
      row.appendChild(dateEl);
      row.appendChild(delBtn);
      logListEl.appendChild(row);
    });
  }

  renderLog();

  var logShadeInput = document.getElementById("log-shade-input");
  var logNoteInput = document.getElementById("log-note-input");
  var logSuggestionsEl = document.getElementById("log-suggestions");
  var logAddBtn = document.getElementById("log-add-btn");

  function renderShadeSuggestions(query) {
    query = query.trim().toLowerCase();
    logSuggestionsEl.innerHTML = "";
    if (!query) {
      logSuggestionsEl.classList.remove("active");
      return;
    }
    var matches = ALL_SHADES.filter(function (s) {
      return s.name.toLowerCase().indexOf(query) !== -1;
    }).slice(0, 6);
    if (matches.length === 0) {
      logSuggestionsEl.classList.remove("active");
      return;
    }
    matches.forEach(function (s) {
      var item = document.createElement("div");
      item.className = "log-suggestion-item";
      item.textContent = s.name;
      item.addEventListener("click", function () {
        logShadeInput.value = s.name;
        logSuggestionsEl.classList.remove("active");
      });
      logSuggestionsEl.appendChild(item);
    });
    logSuggestionsEl.classList.add("active");
  }

  logShadeInput.addEventListener("input", function () {
    renderShadeSuggestions(logShadeInput.value);
  });

  logShadeInput.addEventListener("blur", function () {
    setTimeout(function () {
      logSuggestionsEl.classList.remove("active");
    }, 150);
  });

  logAddBtn.addEventListener("click", function () {
    var shadeVal = logShadeInput.value.trim();
    var noteVal = logNoteInput.value.trim();
    if (!shadeVal) return;
    addLogEntry(shadeVal, noteVal);
    logShadeInput.value = "";
    logNoteInput.value = "";
    logSuggestionsEl.classList.remove("active");
  });

  /* ======================================================
     SERVICE WORKER
     ====================================================== */

  if ("serviceWorker" in navigator) {
    window.addEventListener("load", function () {
      navigator.serviceWorker.register("sw.js").catch(function () {});
    });
  }

})();
</script>

</body>
